[tool.ruff]
line-length = 88
# Should track the runtime (the Chainguard base ships Python 3.14, ADR-0003), but
# ruff 0.9.2 only understands up to py313 — `py314` is a hard TOML parse error.
target-version = "py313"

[tool.ruff.lint]
# pycodestyle, pyflakes, isort, bugbear, flake8-bandit (security).
select = ["E", "F", "I", "B", "S"]

[tool.ruff.lint.per-file-ignores]
# assert is fine in tests; bandit's S101 is noise there.
"tests/*" = ["S101"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
pythonpath = ["."]
