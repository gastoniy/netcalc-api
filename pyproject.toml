[tool.ruff]
line-length = 88
# Tracks the runtime: the Chainguard base ships Python 3.14 (ADR-0003).
# Requires ruff >= 0.11; older ruff rejects `py314` as a hard TOML parse error
# (not a warning), so bump the pin in requirements-dev.in before touching this.
target-version = "py314"

[tool.ruff.lint]
# pycodestyle, pyflakes, isort, bugbear, flake8-bandit (security).
select = ["E", "F", "I", "B", "S"]

[tool.ruff.lint.per-file-ignores]
# assert is fine in tests; bandit's S101 is noise there.
"tests/*" = ["S101"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
pythonpath = ["."]
